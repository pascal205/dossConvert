<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
    <section>
        <form>
            <h2>Convertir les mesures de température</h2>
            <div class="laclass">
                <label>Entrez la longueur à convertir</label>
                <di class="ent">
                    <input type="number" id="temperature" value="">
                    <select id="temper">
                        <option value="Km">Celsius</option>
                        <option value="cm">Fahrenhait</option>
                        <option value="mil">Kelvin</option>
                    </select>
                </div>
            </div>
            <div class="laclass">
                <label>Sélectionner la mesure de convertion</label>
                <select id="temp">
                    <option value="Km">Celsius</option>
                    <option value="cm">Fahrenhait</option>
                    <option value="mil">Kelvin</option>
                </select>
            </div>

            <div class="submit">
                <input type="submit" id="convertir" value="Convertir">
            </div>
        </form>
    </section>
</body>
</html>
