<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <form>
            <div class="laclass">
                <label>Longueur</label>
                <div class="input"><input type="number" id="longueur"></div>
                    <select id="long">
                        <option value="Km">Kilomètre</option>
                        <option value="cm">Centimètre</option>
                        <option value="mil">Milimètre</option>
                        <option value="Ya">Yard</option>
                        <option value="Ya">Pied</option>
                        <option value="Ya">Pouce</option>
                    </select>
            </div>
            <div class="laclass">
                <label>Masse</label>
                <div class="input"><input type="number" id="masse"></div>
                <select id="mas">
                    <option value="Kg">Kilogramme</option>
                    <option value="g">Gramme</option>
                    <option value="mg">Miligramme</option>
                    <option value="t">tonnne</option>
                    <option value="liv">livre</option>
                    <option value="once">once</option>
                    <option value="st">Stone</option>
                </select>
            </div>
            <div class="laclass">
                <label>Température</label>
                <div class="input"><input type="number" id="temperature"></div>
                <select id="temp">
                    <option value="Km">Celsius</option>
                    <option value="cm">Fahrenhait</option>
                    <option value="mil">Kelvin</option>
                </select>
            </div>

            <div class="submit">
                <input type="submit" id="convertir" value="Convertir">
            </div>
        </form>
    </section>
</body>
</html>
