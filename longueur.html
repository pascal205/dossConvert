<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
    <section>
        <form>
            <h2 class="text-blue">Convertir les mesures de longueur</h2>
            <div class="laclass">
                <input type="text" id="ecran">
            </div>
            <div class="laclass">
                <label>Entrez la longueur à convertir</label>
                <div class="ent">
                    <input type="number" id="longueur" value="">
                    <select id="long">
                        <option value="km">Kilomètre</option>
                        <option value="cm">Centimètre</option>
                        <option value="mil">Milimètre</option>
                        <option value="Ya">Yard</option>
                        <option value="pi">Pied</option>
                        <option value="pouce">Pouce</option>
                    </select>
                </div>
            </div>
            <div class="laclass">
                <label>Sélectionner la mesure de convertion</label>
                <select id="lon">
                    <option value="km">Kilomètre</option>
                    <option value="cm">Centimètre</option>
                    <option value="mil">Milimètre</option>
                    <option value="ya">Yard</option>
                    <option value="pi">Pied</option>
                    <option value="pouce">Pouce</option>
                </select>
            </div>

            <div class="submit">
                <input type="submit" id="convertir" value="Convertir">
            </div>
        </form>
    </section>

    <script src="long.js"></script>
</body>
</html>
